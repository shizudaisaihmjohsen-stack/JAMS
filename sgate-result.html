<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>S-GATE 認証結果 | JAMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Noto+Sans+JP:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap site-header-inner">
        <div class="brand">
          <div class="brand-mark"><img src="assets/hm-logo-transparent.png" alt="浜松静大祭実行委員会"></div>
          <div>
            <div class="brand-kicker">浜松静大祭実行委員会</div>
            <h1>情報宣伝部 部員認証・管理システム</h1>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap sgate-verify-page">
      <section class="card sgate-verify-card">
        <p class="section-en">S-GATE</p>
        <h2 id="resultTitle">認証結果を確認しています</h2>
        <p id="resultText" hidden></p>
        <a class="button-link" href="index.html">JAMSに戻る</a>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      const status = params.get("status");
      const mode = params.get("mode");
      const token = params.get("token");
      if (token || mode === "token") {
        location.replace(`verify.html${location.search}`);
      }

      const messages = {
        login_ok: ["Discord認証が完了しました", "続けてJAMSを開いてください。"],
        state_error: ["認証を完了できませんでした", "もう一度Discord認証を実行してください。"],
        discord_error: ["Discord認証がキャンセルされました", "Discord側で認証が完了しませんでした。"],
        error: ["認証処理でエラーが発生しました", "時間をおいて、もう一度実行してください。"]
      };
      const [title, text] = messages[status] ?? messages.error;
      document.querySelector("#resultTitle").textContent = title;
      document.querySelector("#resultText").textContent = text;
      document.querySelector("#resultText").hidden = !text;
    </script>
  </body>
</html>
