<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <meta name="theme-color" content="#2f7fb6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="JAMS">
    <title>JAMS | 情報宣伝部 部員認証・管理システム</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="assets/hm-logo-transparent.png?v=20260622-1">
    <link rel="apple-touch-icon" href="assets/hm-logo.png?v=20260622-1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Noto+Sans+JP:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260703-4">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap site-header-inner">
        <div class="brand">
          <div class="brand-mark"><img src="assets/hm-logo-transparent.png" alt="浜松静大祭実行委員会"></div>
          <div>
            <div class="brand-kicker">浜松静大祭実行委員会</div>
            <h1>情報宣伝部 部員認証・管理システム</h1>
          </div>
        </div>
        <nav id="mainNav" class="top-switch-nav" aria-label="画面切り替えメニュー">
          <button class="tab active" data-view="register"><span class="tab-en" aria-label="Entry"><i>E</i><i>N</i><i>T</i><i>R</i><i>Y</i></span>登録</button>
          <button class="tab" data-view="list"><span class="tab-en" aria-label="Member"><i>M</i><i>E</i><i>M</i><i>B</i><i>E</i><i>R</i></span>一覧</button>
          <button class="tab" data-view="search"><span class="tab-en" aria-label="Search"><i>S</i><i>E</i><i>A</i><i>R</i><i>C</i><i>H</i></span>検索</button>
          <button class="tab" data-view="settings"><span class="tab-en" aria-label="Data"><i>D</i><i>A</i><i>T</i><i>A</i></span>管理</button>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <section id="view-login" class="view">
        <div class="card login-card">
          <p class="section-en">LOGIN</p>
          <h2>JAMSへログイン</h2>
          <div class="screen-control-panel login-panel">
            <div id="loginActionBox" class="login-action-box">
              <a id="appLoginLink" class="primary" href="#" aria-disabled="true">Discordでログイン</a>
            </div>
            <form id="directAuthForm" class="direct-auth-form" hidden>
              <div class="row">
                <div>
                  <label for="directStudentId">学籍番号</label>
                  <input id="directStudentId" autocomplete="off" placeholder="525A2001" maxlength="8">
                </div>
                <div>
                  <label for="directEmail">大学メールアドレス</label>
                  <input id="directEmail" type="email" autocomplete="email" placeholder="example.25@shizuoka.ac.jp">
                </div>
              </div>
              <button id="directAuthStartButton" class="primary" type="submit">認証コードを送信</button>
            </form>
            <form id="directCodeForm" class="direct-auth-form" hidden>
              <label for="directCode">認証コード</label>
              <input id="directCode" autocomplete="one-time-code" inputmode="numeric" placeholder="123456" maxlength="6">
              <button id="directAuthConfirmButton" class="primary" type="submit">認証を完了</button>
            </form>
            <div id="directAuthMessage" class="form-status"></div>
            <div id="loginMessage" class="hint" hidden></div>
          </div>
        </div>
      </section>

      <section id="view-register" class="view hidden">
        <div class="grid">
          <div class="card">
            <p class="section-en">Entry</p>
            <h2>部員登録</h2>
            <form id="memberForm">
              <input type="hidden" id="editingId">
              <div class="register-layout">
                <div class="register-left">
                  <div class="register-field-grid">
                    <div><label for="name">氏名</label><input id="name" required autocomplete="name" placeholder="例：山田 太郎"></div>
                    <div><label for="kana">フリガナ</label><input id="kana" placeholder="例：ヤマダ タロウ"></div>
                    <div><label for="lineName">LINE名</label><input id="lineName" required placeholder="例：たろう"></div>
                    <div><label for="studentId">学籍番号</label><input id="studentId" required placeholder="例：525A2001" maxlength="20"></div>
                  </div>
                  <div class="derived register-derived" id="derivedBox">
                    <dl>
                      <dt>学年</dt>
                      <dd id="derivedGrade">未判定</dd>
                      <dt>学部</dt>
                      <dd id="derivedFaculty">未判定</dd>
                      <dt>学科</dt>
                      <dd id="derivedDepartment">未判定</dd>
                    </dl>
                  </div>
                  <label for="email">メールアドレス</label>
                  <input id="email" class="register-email-input" type="email" placeholder="例：example.25@shizuoka.ac.jp">
                  <div class="register-field-grid register-role-grid">
                    <div>
                      <label for="committeeType">区分</label>
                      <select id="committeeType">
                        <option value="委員長">委員長</option>
                        <option value="JC">JC</option>
                        <option value="SV">SV</option>
                        <option value="RC">RC</option>
                      </select>
                    </div>
                    <div>
                      <label for="position">役職</label>
                      <select id="position">
                        <option value="">なし</option>
                        <option value="部長">部長</option>
                        <option value="課長">課長</option>
                      </select>
                    </div>
                  </div>
                </div>

                <div class="register-right">
                  <div>
                    <label>配属先</label>
                    <div class="assignment-options" id="assignmentOptions">
                      <label class="check"><input type="checkbox" name="assignment" value="ポスター課"> ポスター課</label>
                      <label class="check"><input type="checkbox" name="assignment" value="パンフレット課"> パンフレット課</label>
                      <label class="check"><input type="checkbox" name="assignment" value="ウェブサイト広報課"> ウェブサイト広報課</label>
                      <label class="check"><input type="checkbox" name="assignment" value="学内情報宣伝課"> 学内情報宣伝課</label>
                      <label class="check"><input type="checkbox" name="assignment" value="学外情報宣伝課"> 学外情報宣伝課</label>
                      <label class="check"><input type="checkbox" name="assignment" value="マスコット課"> マスコット課</label>
                      <label class="check"><input type="checkbox" name="assignment" value="SNS広報課"> SNS広報課</label>
                    </div>
                  </div>

                  <div>
                    <label>全体会への参加状況</label>
                    <div class="attendance">
                      <label class="check"><input type="checkbox" id="meet1"> 新歓</label>
                      <label class="check"><input type="checkbox" id="meet2"> 第1回</label>
                      <label class="check"><input type="checkbox" id="meet3"> 第2回</label>
                      <label class="check"><input type="checkbox" id="meet4"> 第3回</label>
                      <label class="check"><input type="checkbox" id="meet5"> 第4回</label>
                      <label class="check"><input type="checkbox" id="meet6"> 第5回</label>
                    </div>
                  </div>

                  <div class="register-actions">
                    <div id="formMessage"></div>
                    <div class="buttons">
                      <button class="primary" type="submit" id="saveBtn">登録する</button>
                      <button class="secondary" type="button" id="clearBtn">入力をクリア</button>
                    </div>
                  </div>
                </div>
              </div>
            </form>
          </div>
        </div>
      </section>

      <section id="view-list" class="view hidden">
        <div class="card list-card">
          <p class="section-en">Member</p>
          <h2>部員一覧</h2>
          <div class="list-control-panel">
            <div class="list-control-grid">
              <div class="control-field control-field-wide">
                <label for="listFilter">一覧内検索</label>
                <input id="listFilter" placeholder="氏名・フリガナ・LINE名・学籍番号・配属先">
              </div>
              <div class="control-field">
                <label for="assignmentFilter">課別絞り込み</label>
                <select id="assignmentFilter">
                  <option value="">すべての課</option>
                  <option value="ポスター課">ポスター課</option>
                  <option value="パンフレット課">パンフレット課</option>
                  <option value="ウェブサイト広報課">ウェブサイト広報課</option>
                  <option value="学内情報宣伝課">学内情報宣伝課</option>
                  <option value="学外情報宣伝課">学外情報宣伝課</option>
                  <option value="マスコット課">マスコット課</option>
                  <option value="SNS広報課">SNS広報課</option>
                  <option value="__unassigned__">未設定</option>
                </select>
              </div>
              <div class="control-field">
                <label for="sortBy">並び替え</label>
                <select id="sortBy">
                  <option value="number">部員ナンバー順</option>
                  <option value="name">氏名順</option>
                  <option value="studentId">学籍番号順</option>
                  <option value="assignment">配属先順</option>
                </select>
              </div>
            </div>
            <div class="meeting-filter-grid">
              <div class="list-filter-panel compact-filter">
                <div class="filter-title">全体会 未参加者</div>
                <div class="absence-checks" id="absenceFilters">
                  <label class="check"><input type="checkbox" name="absenceFilter" value="0"> 新歓</label>
                  <label class="check"><input type="checkbox" name="absenceFilter" value="1"> 第1回</label>
                  <label class="check"><input type="checkbox" name="absenceFilter" value="2"> 第2回</label>
                  <label class="check"><input type="checkbox" name="absenceFilter" value="3"> 第3回</label>
                  <label class="check"><input type="checkbox" name="absenceFilter" value="4"> 第4回</label>
                  <label class="check"><input type="checkbox" name="absenceFilter" value="5"> 第5回</label>
                </div>
              </div>
              <div class="list-filter-panel compact-filter">
                <div class="filter-title">全体会 参加者</div>
                <div class="presence-checks" id="presenceFilters">
                  <label class="check"><input type="checkbox" name="presenceFilter" value="0"> 新歓</label>
                  <label class="check"><input type="checkbox" name="presenceFilter" value="1"> 第1回</label>
                  <label class="check"><input type="checkbox" name="presenceFilter" value="2"> 第2回</label>
                  <label class="check"><input type="checkbox" name="presenceFilter" value="3"> 第3回</label>
                  <label class="check"><input type="checkbox" name="presenceFilter" value="4"> 第4回</label>
                  <label class="check"><input type="checkbox" name="presenceFilter" value="5"> 第5回</label>
                </div>
              </div>
            </div>
          </div>
          <div id="memberList"></div>
        </div>
      </section>

      <section id="view-search" class="view hidden">
        <div class="card">
          <p class="section-en">Search</p>
          <h2>個人情報検索</h2>
          <div class="screen-control-panel search-control-panel">
            <label for="searchKey">部員番号・氏名・LINE名・学籍番号のいずれかを入力してください</label>
            <input id="searchKey" placeholder="例：J1 / 山田 / たろう / 525A2001">
            <div class="buttons"><button class="primary" id="searchBtn">検索する</button><button class="secondary" id="showAllProfiles">全員を表示</button></div>
          </div>
          <div id="searchResult" style="margin-top:16px"></div>
        </div>
      </section>

      <section id="view-settings" class="view hidden">
        <div class="card">
          <p class="section-en">Data</p>
          <h2>管理</h2>
          <div class="screen-control-panel management-panel">
            <div class="management-session-bar">
              <div>
                <p class="management-eyebrow">ログイン中</p>
                <p id="adminStatusText">管理者状態を確認していません。</p>
              </div>
              <input id="sGateInviteLink" type="hidden" value="https://jams-s-gate.shizudaisai-hm.workers.dev/sgate/auth">
              <input id="managementPageLink" type="hidden" value="https://shizudaisaihmjohsen-stack.github.io/JAMS/">
              <div class="buttons management-session-actions">
                <button class="secondary" type="button" id="copySgateLinkButton">認証URLをコピー</button>
                <button class="secondary" type="button" id="copyManagementLinkButton">管理画面URLをコピー</button>
                <button class="secondary" type="button" id="logoutButton" hidden>ログアウト</button>
              </div>
            </div>
            <div id="dataMessage"></div>
          </div>

          <div class="derived management-stats">
            <div class="management-stat-grid">
              <div class="management-stat"><span>総部員</span><strong id="totalCount">0</strong></div>
              <div class="management-stat"><span>委員長</span><strong id="chairCount">0</strong></div>
              <div class="management-stat"><span>RC</span><strong id="rcCount">0</strong></div>
              <div class="management-stat"><span>SV</span><strong id="svCount">0</strong></div>
              <div class="management-stat"><span>JC</span><strong id="jcCount">0</strong></div>
              <div class="management-stat"><span>認証済み</span><strong id="verifiedCount">0</strong></div>
              <div class="management-stat"><span>未認証</span><strong id="unverifiedCount">0</strong></div>
            </div>
          </div>

          <div class="screen-control-panel management-dm-panel">
            <div class="dm-mode-switch" role="radiogroup" aria-label="DM送信対象">
              <label><input type="radio" name="dmTargetMode" value="absence" checked> 欠席者</label>
              <label><input type="radio" name="dmTargetMode" value="selected"> 個別選択</label>
            </div>
            <div class="management-dm-head">
              <div>
                <p class="panel-kicker">Discord DM</p>
                <h3 id="dmPanelTitle">全体会未参加者への一括連絡</h3>
              </div>
              <div id="dmMeetingField" class="control-field">
                <label for="dmMeetingSelect">対象の全体会</label>
                <select id="dmMeetingSelect">
                  <option value="新歓">新歓</option>
                  <option value="第1回">第1回</option>
                  <option value="第2回">第2回</option>
                  <option value="第3回">第3回</option>
                  <option value="第4回">第4回</option>
                  <option value="第5回">第5回</option>
                </select>
              </div>
            </div>
            <div id="dmMemberPicker" class="dm-member-picker" hidden>
              <div class="dm-member-picker-toolbar">
                <label for="dmMemberSearch">送信する部員を選択</label>
                <input id="dmMemberSearch" type="search" placeholder="部員No.・氏名・学籍番号で検索">
                <div class="buttons">
                  <button class="secondary" type="button" id="selectVisibleDmMembersButton">表示中を選択</button>
                  <button class="secondary" type="button" id="clearDmMembersButton">選択解除</button>
                </div>
              </div>
              <p id="dmSelectedCount" class="dm-selected-count">0人選択中</p>
              <div id="dmMemberOptions" class="dm-member-options"></div>
            </div>
            <label for="dmMessage">送信メッセージ</label>
            <textarea id="dmMessage" rows="6">情報宣伝部です。
全体会の参加状況について確認したいことがあります。
このDMを確認したら、部長または担当者まで返信してください。</textarea>
            <div class="buttons management-dm-actions">
              <button class="secondary" type="button" id="previewDmButton">対象確認</button>
              <button class="danger" type="button" id="sendDmButton" disabled>未参加者へDM送信</button>
            </div>
            <div id="dmPreview" class="hint" hidden></div>
          </div>

          <div class="table-wrap management-member-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>部員No.</th>
                  <th>氏名</th>
                  <th>フリガナ</th>
                  <th>ユーザー名</th>
                  <th>Discord ID</th>
                  <th>認証状態</th>
                </tr>
              </thead>
              <tbody id="memberTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script>
      if ("serviceWorker" in navigator) {
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      }
    </script>
    <script src="config.js?v=20260619"></script>
    <script src="app.js?v=20260703-4"></script>
    <script src="pwa.js?v=20260703-4" defer></script>
  </body>
</html>
