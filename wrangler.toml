name = "jams-s-gate"
main = "worker/src/index.js"
compatibility_date = "2026-06-11"

# Create a D1 database and replace database_id before deployment.
[[d1_databases]]
binding = "DB"
database_name = "jams"
database_id = "0c43ae9d-86be-404e-9853-988aa3d412aa"

[secrets]
required = [
  "DISCORD_CLIENT_ID",
  "DISCORD_CLIENT_SECRET",
  "DISCORD_BOT_TOKEN",
  "DISCORD_GUILD_ID",
  "DISCORD_ROLE_DIRECTOR",
  "DISCORD_ROLE_MANAGER",
  "DISCORD_ROLE_S_GATE",
  "DISCORD_ROLE_S_GATE_ADMIN",
  "DISCORD_ROLE_S_GATE_VERIFIED",
  "DISCORD_ROLE_S_GATE_UNVERIFIED",
  "DISCORD_ROLE_RC",
  "DISCORD_ROLE_SV",
  "DISCORD_ROLE_JC",
  "DISCORD_ROLE_POSTER",
  "DISCORD_ROLE_PAMPHLET",
  "DISCORD_ROLE_WEBSITE",
  "DISCORD_ROLE_INSIDE_PR",
  "DISCORD_ROLE_OUTSIDE_PR",
  "DISCORD_ROLE_MASCOT",
  "DISCORD_ROLE_SNS",
  "S_GATE_EMAIL_FROM",
  "S_GATE_ALLOWED_EMAIL_DOMAINS",
  "S_GATE_SESSION_SECRET",
  "S_GATE_ADMIN_DISCORD_IDS",
  "GOOGLE_APPS_SCRIPT_MAIL_URL",
  "GOOGLE_APPS_SCRIPT_MAIL_SECRET",
  "JAMS_FRONTEND_URL",
  "JAMS_FRONTEND_ORIGIN"
]
