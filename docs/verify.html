<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>S-GATE 認証コード入力 | JAMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Noto+Sans+JP:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap site-header-inner">
        <div class="brand">
          <div class="brand-mark"><img src="assets/hm-logo-transparent.png" alt="浜松静大祭実行委員会"></div>
          <div>
            <div class="brand-kicker">浜松静大祭実行委員会</div>
            <h1>情報宣伝部 部員認証・管理システム</h1>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap sgate-verify-page">
      <section class="card sgate-verify-card">
        <p class="section-en">S-GATE</p>
        <h2 id="resultTitle">認証コードを入力してください</h2>
        <p id="resultText" class="sgate-lead">大学メールに届いた6桁の認証コードを入力すると、Discordロールを更新します。</p>

        <form id="verificationForm" class="verify-form">
          <label for="verificationCodeInput">認証コード</label>
          <input id="verificationCodeInput" class="verify-code-input" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="123456" required>
          <div class="buttons verify-actions">
            <button class="primary" type="submit">認証を完了</button>
            <a class="secondary sgate-back-link" href="index.html">JAMSに戻る</a>
          </div>
          <p id="verificationStatus" class="form-status"></p>
        </form>
        <a class="sgate-return-link" href="index.html">JAMSに戻る</a>
      </section>
    </main>
    <script src="config.js"></script>
    <script>
      const sGateBaseUrl = window.JAMS_CONFIG?.sGateBaseUrl?.replace(/\/$/, "");
      const params = new URLSearchParams(location.search);
      const token = params.get("token");
      const form = document.querySelector("#verificationForm");
      const statusText = document.querySelector("#verificationStatus");
      const codeInput = document.querySelector("#verificationCodeInput");

      if (!sGateBaseUrl || !token) {
        form.hidden = true;
        document.querySelector("#resultTitle").textContent = "認証リンクが正しくありません";
        document.querySelector("#resultText").textContent = "Discordの /auth から表示されたリンクを開き直してください。";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        statusText.textContent = "認証コードを確認しています。";
        try {
          const response = await fetch(`${sGateBaseUrl}/api/sgate/email/confirm-token`, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              token,
              code: codeInput.value,
            }),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || data.message || data.error || "request_failed");
          }
          document.querySelector("#resultTitle").textContent = "S-GATE認証が完了しました";
          document.querySelector("#resultText").textContent = `${data.member.name} さんを認証しました。Discordロールを更新しました。`;
          statusText.textContent = `付与ロール: ${data.roles.join(" / ")}`;
        } catch (error) {
          statusText.textContent = `認証できませんでした: ${error.message}`;
        }
      });
    </script>
  </body>
</html>
